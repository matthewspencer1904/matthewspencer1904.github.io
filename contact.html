    <main>
        <!--this section is for.sending me a message-->
        <section class="section">
            <h2>Get in touch</h2>
                <form id="contact-form" action="https://formsubmit.co/2ffac792cda70563c9a09d27fa48a1cf" method="post" autocomplete="on">
                    <fieldset>
                        <legend>Your Deatils</legend> <!--form input for a bunch of different details-->
                        <label for="name">Full Name</label>
                        <input id="name" name="name" type="text" placeholder="Ned Kelly" required minlength="6">

                        <label for="email">Email Adress</label>
                        <input id="email" name="email" type="email" Placeholder="name@example.com" required autocomplete="email">

                        <label for="message">Message</label>
                        <textarea id="message" name="message" type="message" placeholder="How can I help?" required minlength="8"></textarea>
                        
                        <!--honeypot anti spam field-->
                        <input type="text" name="honey" tabindex="-1" aria-hidden="true" style="position: absolute; left: -9999px;">

                        <button type="submit"> Send </button>

                     </fieldset>
                </form>
        </section>

        <section class="section" aria-labelledby="socials">
            <h3 id="socials">Add me on Socials</h3>
            <ul>
                <li><a href="https://www.instagram.com/" rel="noopener"> Instagram</a></li>
            </ul>

        </section>
